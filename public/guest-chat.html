<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Guest Chat</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #111827;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    #top-injection-anchor {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 84%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg-sender {
      font-size: 11px;
      color: #64748b;
      padding: 0 6px;
      font-weight: 600;
    }
    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }
    .msg.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }
    .msg-bubble {
      border-radius: 18px;
      padding: 12px 14px;
      word-break: break-word;
      line-height: 1.5;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .msg.user .msg-bubble {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }
    .msg.assistant .msg-bubble {
      background: #ffffff;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 6px;
    }
    .msg.pending .msg-bubble {
      opacity: 0.72;
    }
    .msg-time {
      font-size: 11px;
      color: #94a3b8;
      padding: 0 4px;
    }
    .template-card {
      cursor: pointer;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.28);
    }
    .template-label {
      font-size: 11px;
      opacity: 0.84;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .template-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .template-description {
      font-size: 12px;
      opacity: 0.92;
      line-height: 1.4;
    }
    #typing-indicator {
      display: none;
      padding: 0 16px 10px;
      color: #64748b;
      font-size: 12px;
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
      align-items: center;
    }
    .input-area input {
      flex: 1;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
    }
    .input-area input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .input-area button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      border-radius: 999px;
      padding: 0 18px;
      height: 44px;
      font-weight: 600;
      cursor: pointer;
    }
    .input-area button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
  </style>
  <style id="dynamic-plugin-styles"></style>
</head>
<body>
  <div id="top-injection-anchor"></div>
  <div id="message-list"></div>
  <div id="typing-indicator">Assistant is responding...</div>
  <div class="input-area" id="bottom-injection-anchor">
    <input id="msg-input" type="text" placeholder="Send a message or type HTML for a debug template" />
    <button id="send-btn" type="button">Send</button>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const chatId = params.get("chatId") || "";
    const messageList = document.getElementById("message-list");
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");
    const typingIndicator = document.getElementById("typing-indicator");
    const dynamicPluginStyles = document.getElementById("dynamic-plugin-styles");
    const topInjectionAnchor = document.getElementById("top-injection-anchor");
    const bottomInjectionAnchor = document.getElementById("bottom-injection-anchor");
    let streamElement = null;
    let streamText = "";
    let isStreaming = false;
    let activePlugins = [];
    let sourceMessages = [];

    function log() {
      console.debug("[guest-chat]", ...arguments);
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      const date = new Date(timestamp);
      return date.getHours().toString().padStart(2, "0") + ":" + date.getMinutes().toString().padStart(2, "0");
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messageList.scrollTop = messageList.scrollHeight;
      });
    }

    function installBaseFilters() {
      window.ChatAPI.filters["render:text"] = [
        (text) => escapeHtml(String(text ?? "")).replace(/\n/g, "<br />")
      ];
    }

    window.ChatAPI = {
      events: {},
      filters: {},
      on(event, callback) {
        if (!this.events[event]) this.events[event] = [];
        this.events[event].push(callback);
      },
      emit(event, payload) {
        (this.events[event] || []).forEach((callback) => callback(payload));
      },
      addFilter(name, callback) {
        if (!this.filters[name]) this.filters[name] = [];
        this.filters[name].push(callback);
      },
      applyFilter(name, value) {
        let result = value;
        (this.filters[name] || []).forEach((callback) => {
          result = callback(result);
        });
        return result;
      },
      sendToHost(action, payload) {
        log("postMessage -> host", action, payload);
        window.parent.postMessage({ action, payload }, "*");
      }
    };

    installBaseFilters();

    function resetPluginRuntime() {
      window.ChatAPI.events = {};
      window.ChatAPI.filters = {};
      installBaseFilters();
      dynamicPluginStyles.textContent = "";
      document.body.className = "";
      if (topInjectionAnchor) {
        topInjectionAnchor.innerHTML = "";
      }
      if (bottomInjectionAnchor) {
        Array.from(bottomInjectionAnchor.children).forEach((child) => {
          if (child.id !== "msg-input" && child.id !== "send-btn") {
            child.remove();
          }
        });
      }
    }

    function loadPlugins(plugins) {
      activePlugins = Array.isArray(plugins) ? plugins : [];
      resetPluginRuntime();
      dynamicPluginStyles.textContent = activePlugins.map((plugin) => plugin.css || "").join("\n\n");
      activePlugins.forEach((plugin) => {
        if (!plugin.js) return;
        try {
          window.eval(plugin.js + '\n//# sourceURL=' + plugin.id + '.js');
        } catch (error) {
          log("plugin eval error", plugin.id, error);
        }
      });
      window.ChatAPI.emit("core:mounted", {});
      rerenderAllMessages();
      log("plugins loaded", activePlugins.map((plugin) => plugin.id));
    }

    function createTemplateMarkup(templateData) {
      return [
        '<div class="template-card">',
        '<div class="template-label">Theme Template</div>',
        '<div class="template-title">' + escapeHtml(templateData.name || "Template") + '</div>',
        '<div class="template-description">' + escapeHtml(templateData.description || "Tap to install this template") + '</div>',
        '</div>'
      ].join("");
    }

    function getDefaultSenderName(message) {
      if (message.role === "user") return "You";
      if (message.role === "assistant") return "Assistant";
      return "System";
    }

    function renderStandardMessageContent(node, message) {
      node.dataset.originalContent = message.content || "";
      const filtered = window.ChatAPI.applyFilter("render:text", message.content || "");
      const senderName = escapeHtml(message.senderName || getDefaultSenderName(message));
      node.innerHTML = [
        '<div class="msg-sender">' + senderName + '</div>',
        '<div class="msg-bubble">' + filtered + '</div>',
        '<div class="msg-time">' + formatTime(message.timestamp) + '</div>'
      ].join("");
    }

    function rerenderAllMessages() {
      // Fully rebuild DOM from source messages so transform:message
      // filters (e.g. message splitter) can split or combine correctly.
      messageList.innerHTML = "";
      sourceMessages.forEach(renderMessage);
      scrollToBottom();
    }

    function renderSingleMessage(message) {
      const existingByClientId = message.clientMessageId
        ? messageList.querySelector('[data-client-id="' + CSS.escape(message.clientMessageId) + '"]')
        : null;
      const existingById = message.id
        ? messageList.querySelector('[data-id="' + CSS.escape(message.id) + '"]')
        : null;
      const existing = existingByClientId || existingById;
      const node = existing || document.createElement("div");
      node.className = "msg " + message.role + (message.pending ? " pending" : "");
      if (message.id) node.dataset.id = message.id;
      if (message.clientMessageId) node.dataset.clientId = message.clientMessageId;
      node.dataset.role = message.role;
      node.dataset.timestamp = String(message.timestamp || Date.now());
      node.dataset.senderName = message.senderName || getDefaultSenderName(message);

      if (message.isTemplate && message.templateData) {
        let parsed = null;
        try {
          parsed = JSON.parse(message.templateData);
        } catch (error) {
          log("template parse error", error);
        }
        delete node.dataset.originalContent;
        node.dataset.templateCard = "true";
        node.innerHTML = parsed ? createTemplateMarkup(parsed) : '<div class="msg-bubble">' + escapeHtml(message.content) + '</div>';
        node.onclick = parsed
          ? () => window.ChatAPI.sendToHost("requestInstallTemplate", { templateData: parsed })
          : null;
      } else {
        node.dataset.templateCard = "false";
        node.onclick = null;
        renderStandardMessageContent(node, message);
      }

      if (!existing) {
        messageList.appendChild(node);
      }
      return node;
    }

    function renderMessage(message) {
      // Allow plugins to transform one message into multiple via transform:message filter.
      // The filter receives a message and should return an array of message objects.
      const transformed = window.ChatAPI.applyFilter("transform:message", [message]);
      const messages = Array.isArray(transformed) ? transformed : [message];
      let lastNode = null;
      messages.forEach((msg) => {
        lastNode = renderSingleMessage(msg);
      });
      scrollToBottom();
      return lastNode;
    }

    function resetMessages(messages) {
      messageList.innerHTML = "";
      streamElement = null;
      streamText = "";
      sourceMessages = messages.slice();
      messages.forEach(renderMessage);
      scrollToBottom();
    }

    function createPendingUserMessage(text, clientMessageId) {
      return {
        id: clientMessageId,
        clientMessageId,
        role: "user",
        content: text,
        timestamp: Date.now(),
        pending: true
      };
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || isStreaming) return;
      const clientMessageId = window.crypto && "randomUUID" in window.crypto
        ? window.crypto.randomUUID()
        : String(Date.now()) + "-" + Math.random().toString(16).slice(2);
      renderMessage(createPendingUserMessage(text, clientMessageId));
      msgInput.value = "";
      window.ChatAPI.sendToHost("sendMessage", { text, clientMessageId });
    }

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      log("message <- host", data);
      if (!data || !data.action) return;

      if (data.action === "initChat") {
        loadPlugins(data.payload?.templates || []);
        resetMessages(data.payload?.messages || []);
      }

      if (data.action === "setTemplates") {
        loadPlugins(data.payload?.templates || []);
      }

      if (data.action === "appendMessage" && data.payload?.message) {
        sourceMessages.push(data.payload.message);
        renderMessage(data.payload.message);
      }

      if (data.action === "streamStart") {
        isStreaming = true;
        streamText = "";
        typingIndicator.style.display = "block";
        streamElement = document.createElement("div");
        streamElement.className = "msg assistant";
        streamElement.dataset.streaming = "true";
        streamElement.dataset.role = "assistant";
        streamElement.dataset.senderName = "Assistant";
        streamElement.innerHTML = '<div class="msg-sender">Assistant</div><div class="msg-bubble"></div>';
        messageList.appendChild(streamElement);
        scrollToBottom();
      }

      if (data.action === "streamToken" && streamElement && data.payload?.token) {
        streamText += data.payload.token;
        streamElement.dataset.originalContent = streamText;
        const bubble = streamElement.querySelector(".msg-bubble");
        if (bubble) {
          bubble.innerHTML = window.ChatAPI.applyFilter("render:text", streamText);
        }
        scrollToBottom();
      }

      if (data.action === "streamEnd") {
        isStreaming = false;
        typingIndicator.style.display = "none";
        if (streamElement && data.payload?.message) {
          streamElement.remove();
          sourceMessages.push(data.payload.message);
          renderMessage(data.payload.message);
        }
        streamElement = null;
        streamText = "";
      }

      if (data.action === "streamError") {
        isStreaming = false;
        typingIndicator.style.display = "none";
        if (streamElement) {
          streamElement.remove();
          streamElement = null;
        }
        streamText = "";
        const errorMsg = data.payload?.message || {
          id: String(Date.now()),
          role: "assistant",
          content: "Error: " + (data.payload?.error || "Unknown error"),
          timestamp: Date.now()
        };
        sourceMessages.push(errorMsg);
        renderMessage(errorMsg);
      }
    });

    log("guest ready");
    window.ChatAPI.sendToHost("guestReady", {});
  </script>
</body>
</html>
