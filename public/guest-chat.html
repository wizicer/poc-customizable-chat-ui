<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Chat</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #111827;
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }
    #message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg {
      max-width: 84%;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
    }
    .msg.assistant {
      align-self: flex-start;
      align-items: flex-start;
    }
    .msg-bubble {
      border-radius: 18px;
      padding: 12px 14px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
    }
    .msg.user .msg-bubble {
      background: #2563eb;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }
    .msg.assistant .msg-bubble {
      background: #ffffff;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 6px;
    }
    .msg.pending .msg-bubble {
      opacity: 0.72;
    }
    .msg-time {
      font-size: 11px;
      color: #94a3b8;
      padding: 0 4px;
    }
    #typing-indicator {
      display: none;
      padding: 0 16px 10px;
      color: #64748b;
      font-size: 12px;
    }
    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom, 0px));
      border-top: 1px solid #e5e7eb;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(16px);
    }
    .input-area input {
      flex: 1;
      border: 1px solid #cbd5e1;
      background: #ffffff;
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
    }
    .input-area input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }
    .input-area button {
      border: none;
      background: #2563eb;
      color: #ffffff;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 600;
      cursor: pointer;
    }
    .input-area button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    .template-card {
      cursor: pointer;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(79, 70, 229, 0.28);
    }
    .template-label {
      font-size: 11px;
      opacity: 0.84;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .template-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .template-description {
      font-size: 12px;
      opacity: 0.92;
      line-height: 1.4;
    }
  </style>
  <style id="template-styles"></style>
</head>
<body>
  <div id="message-list"></div>
  <div id="typing-indicator">Assistant is responding...</div>
  <div class="input-area">
    <input id="msg-input" type="text" placeholder="Send a message or type HTML for a debug template" />
    <button id="send-btn" type="button">Send</button>
  </div>

  <script>
    const messageList = document.getElementById("message-list");
    const msgInput = document.getElementById("msg-input");
    const sendBtn = document.getElementById("send-btn");
    const typingIndicator = document.getElementById("typing-indicator");
    const templateStyles = document.getElementById("template-styles");
    let streamElement = null;
    let streamText = "";
    let isStreaming = false;

    function log(...args) {
      console.debug("[guest-chat]", ...args);
    }

    function sendToHost(action, payload) {
      log("postMessage -> host", action, payload);
      window.parent.postMessage({ action, payload }, "*");
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text ?? "";
      return div.innerHTML;
    }

    function formatTime(timestamp) {
      if (!timestamp) return "";
      const date = new Date(timestamp);
      return date.getHours().toString().padStart(2, "0") + ":" + date.getMinutes().toString().padStart(2, "0");
    }

    function scrollToBottom() {
      requestAnimationFrame(() => {
        messageList.scrollTop = messageList.scrollHeight;
      });
    }

    function createTemplateMarkup(templateData) {
      return [
        '<div class="template-card">',
        '<div class="template-label">Theme Template</div>',
        '<div class="template-title">' + escapeHtml(templateData.name || "Template") + '</div>',
        '<div class="template-description">' + escapeHtml(templateData.description || "Tap to install this template") + '</div>',
        '</div>'
      ].join("");
    }

    function renderMessage(message) {
      const existingByClientId = message.clientMessageId
        ? messageList.querySelector('[data-client-id="' + CSS.escape(message.clientMessageId) + '"]')
        : null;
      const existingById = message.id
        ? messageList.querySelector('[data-id="' + CSS.escape(message.id) + '"]')
        : null;
      const existing = existingByClientId || existingById;

      let node = existing || document.createElement("div");
      node.className = "msg " + message.role + (message.pending ? " pending" : "");
      if (message.id) node.dataset.id = message.id;
      if (message.clientMessageId) node.dataset.clientId = message.clientMessageId;
      if (!message.pending) delete node.dataset.pending;
      if (message.pending) node.dataset.pending = "true";

      if (message.isTemplate && message.templateData) {
        let parsed = null;
        try {
          parsed = JSON.parse(message.templateData);
        } catch (error) {
          log("template parse error", error);
        }
        node.innerHTML = parsed ? createTemplateMarkup(parsed) : '<div class="msg-bubble">' + escapeHtml(message.content) + '</div>';
        node.onclick = parsed
          ? () => sendToHost("installTemplate", { templateData: parsed })
          : null;
      } else {
        node.onclick = null;
        node.innerHTML = [
          '<div class="msg-bubble">' + escapeHtml(message.content) + '</div>',
          '<div class="msg-time">' + formatTime(message.timestamp) + '</div>'
        ].join("");
      }

      if (!existing) {
        messageList.appendChild(node);
      }
      scrollToBottom();
      return node;
    }

    function resetMessages(messages) {
      messageList.innerHTML = "";
      streamElement = null;
      streamText = "";
      messages.forEach(renderMessage);
      scrollToBottom();
    }

    function applyTemplates(templates) {
      const css = (templates || []).map((template) => template.css || "").join("\n\n");
      templateStyles.textContent = css;
      log("applied templates", templates);
    }

    function createPendingUserMessage(text, clientMessageId) {
      return {
        id: clientMessageId,
        clientMessageId,
        role: "user",
        content: text,
        timestamp: Date.now(),
        pending: true
      };
    }

    function sendMessage() {
      const text = msgInput.value.trim();
      if (!text || isStreaming) return;
      const clientMessageId = window.crypto && "randomUUID" in window.crypto
        ? window.crypto.randomUUID()
        : String(Date.now()) + "-" + Math.random().toString(16).slice(2);
      renderMessage(createPendingUserMessage(text, clientMessageId));
      msgInput.value = "";
      sendToHost("sendMessage", { text, clientMessageId });
    }

    sendBtn.addEventListener("click", sendMessage);
    msgInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    window.addEventListener("message", (event) => {
      const data = event.data;
      log("message <- host", data);
      if (!data || !data.action) return;

      if (data.action === "initChat") {
        resetMessages(data.payload?.messages || []);
        applyTemplates(data.payload?.templates || []);
      }

      if (data.action === "appendMessage" && data.payload?.message) {
        renderMessage(data.payload.message);
      }

      if (data.action === "setTemplates") {
        applyTemplates(data.payload?.templates || []);
      }

      if (data.action === "streamStart") {
        isStreaming = true;
        streamText = "";
        typingIndicator.style.display = "block";
        streamElement = document.createElement("div");
        streamElement.className = "msg assistant";
        streamElement.innerHTML = '<div class="msg-bubble"></div>';
        messageList.appendChild(streamElement);
        scrollToBottom();
      }

      if (data.action === "streamToken" && streamElement && data.payload?.token) {
        streamText += data.payload.token;
        const bubble = streamElement.querySelector(".msg-bubble");
        if (bubble) bubble.textContent = streamText;
        scrollToBottom();
      }

      if (data.action === "streamEnd") {
        isStreaming = false;
        typingIndicator.style.display = "none";
        if (streamElement && data.payload?.message) {
          streamElement.remove();
          renderMessage(data.payload.message);
        }
        streamElement = null;
        streamText = "";
      }

      if (data.action === "streamError") {
        isStreaming = false;
        typingIndicator.style.display = "none";
        if (streamElement) {
          streamElement.remove();
          streamElement = null;
        }
        streamText = "";
        renderMessage({
          id: String(Date.now()),
          role: "assistant",
          content: "Error: " + (data.payload?.error || "Unknown error"),
          timestamp: Date.now()
        });
      }
    });

    log("guest ready");
    sendToHost("guestReady", {});
  </script>
</body>
</html>
