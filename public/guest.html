<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    background: #f7f7f8; color: #1a1a1a;
  }
  #message-list {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; flex-direction: column; max-width: 80%; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-bubble {
    padding: 10px 14px; border-radius: 16px;
    line-height: 1.5; word-wrap: break-word; white-space: pre-wrap;
  }
  .msg.user .msg-bubble {
    background: #007aff; color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: white; color: #1a1a1a;
    border: 1px solid #e5e5e5;
    border-bottom-left-radius: 4px;
  }
  .msg-time { font-size: 11px; color: #999; margin-top: 4px; padding: 0 4px; }
  .msg.user .msg-time { text-align: right; }
  .typing-indicator { padding: 10px 14px; font-style: italic; color: #999; }
  .input-area {
    display: flex; gap: 8px; padding: 12px 16px;
    border-top: 1px solid #e5e5e5; background: white;
  }
  .input-area input {
    flex: 1; padding: 10px 14px; border: 1px solid #ddd;
    border-radius: 20px; outline: none; font-size: 14px;
  }
  .input-area input:focus { border-color: #007aff; }
  .input-area button {
    padding: 10px 18px; border: none; border-radius: 20px;
    background: #007aff; color: white; font-size: 14px;
    cursor: pointer; font-weight: 500;
  }
  .input-area button:disabled { opacity: 0.5; cursor: default; }
  .template-msg {
    padding: 12px; border-radius: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; cursor: pointer; transition: transform 0.1s;
  }
  .template-msg:hover { transform: scale(1.02); }
  .template-msg:active { transform: scale(0.98); }
  .template-label { font-size: 12px; opacity: 0.8; margin-bottom: 4px; }
  .template-title { font-weight: 600; }
</style>
</head>
<body>

<div id="message-list"></div>
<div id="typing-indicator" class="typing-indicator" style="display:none;">Typing...</div>
<div class="input-area">
  <input id="msg-input" type="text" placeholder="Type a message..." />
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const msgList = document.getElementById('message-list');
  const msgInput = document.getElementById('msg-input');
  const typingEl = document.getElementById('typing-indicator');
  let isStreaming = false;
  let streamBubble = null;

  function sendToHost(action, payload) {
    console.log('[Guest] Sending to host:', action, payload);
    window.parent.postMessage({ action, payload }, '*');
  }

  function renderMessage(msg) {
    console.log('[Guest] Rendering message:', msg);
    const div = document.createElement('div');
    div.className = 'msg ' + msg.role;
    div.dataset.id = msg.id;

    if (msg.isTemplate && msg.templateData) {
      try {
        const tpl = JSON.parse(msg.templateData);
        div.innerHTML =
          '<div class="template-msg" onclick="installTemplate(this, \'' + msg.templateData.replace(/'/g, "\\'") + '\')">' +
          '<div class="template-label">📦 Template</div>' +
          '<div class="template-title">' + escapeHtml(tpl.name || 'Custom Template') + '</div>' +
          '</div>';
      } catch {
        div.innerHTML = '<div class="msg-bubble">' + escapeHtml(msg.content) + '</div>';
      }
    } else {
      div.innerHTML =
        '<div class="msg-bubble">' + escapeHtml(msg.content) + '</div>' +
        '<div class="msg-time">' + formatTime(msg.timestamp) + '</div>';
    }

    msgList.appendChild(div);
    scrollToBottom();
    return div;
  }

  function escapeHtml(text) {
    const d = document.createElement('div');
    d.textContent = text;
    return d.innerHTML;
  }

  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }

  function scrollToBottom() {
    requestAnimationFrame(() => { msgList.scrollTop = msgList.scrollHeight; });
  }

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || isStreaming) return;
    msgInput.value = '';
    sendToHost('sendMessage', { text });
  }

  function installTemplate(el, dataStr) {
    try {
      const tpl = JSON.parse(dataStr);
      sendToHost('installTemplate', { templateData: tpl });
    } catch(e) { console.error('[Guest] Failed to parse template', e); }
  }

  msgInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  window.addEventListener('message', function(e) {
    const data = e.data;
    if (!data || !data.action) return;
    
    console.log('[Guest] Received from host:', data.action, data.payload);

    if (data.action === 'initChat') {
      msgList.innerHTML = '';
      const msgs = data.payload.messages || [];
      msgs.forEach(renderMessage);
    } else if (data.action === 'appendMessage') {
      renderMessage(data.payload.message);
    } else if (data.action === 'streamStart') {
      isStreaming = true;
      typingEl.style.display = 'block';
      streamBubble = document.createElement('div');
      streamBubble.className = 'msg assistant';
      streamBubble.innerHTML = '<div class="msg-bubble"></div>';
      msgList.appendChild(streamBubble);
      scrollToBottom();
    } else if (data.action === 'streamToken') {
      if (streamBubble) {
        const bubble = streamBubble.querySelector('.msg-bubble');
        if (bubble) {
          bubble.textContent += data.payload.token;
          scrollToBottom();
        }
      }
    } else if (data.action === 'streamEnd') {
      isStreaming = false;
      typingEl.style.display = 'none';
      if (streamBubble && data.payload.message) {
        streamBubble.dataset.id = data.payload.message.id;
        const timeDiv = document.createElement('div');
        timeDiv.className = 'msg-time';
        timeDiv.textContent = formatTime(data.payload.message.timestamp);
        streamBubble.appendChild(timeDiv);
      }
      streamBubble = null;
    } else if (data.action === 'streamError') {
      isStreaming = false;
      typingEl.style.display = 'none';
      streamBubble = null;
      const errDiv = document.createElement('div');
      errDiv.className = 'msg assistant';
      errDiv.innerHTML = '<div class="msg-bubble" style="color:red;">Error: ' + escapeHtml(data.payload.error) + '</div>';
      msgList.appendChild(errDiv);
      scrollToBottom();
    }
  });

  console.log('[Guest] Ready, sending guestReady');
  sendToHost('guestReady', {});
</script>
</body>
</html>
